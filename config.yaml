# config.yaml (recommended)
separation:
  model: htdemucs
  out_dir: data/stems

meter_key:
  meter_conf_threshold: 0.58
  key_conf_threshold: 0.55

transcription:
  basic_pitch_threshold_cents: 30
  drum_quantize_strength: 0.35

cleanup:
  max_quantize_ms: 25
  min_note_ms: 50

# default output tracks (can be overridden by --tracks)
tracks:
  - drums
  - bass
  - guitar
  - other
  - voxlead
  - voxbg
